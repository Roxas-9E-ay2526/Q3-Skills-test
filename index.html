<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
     <link rel="stylesheet" href="style.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <div class="container main-card">
        <div class="card shadow">
        <div class="card-header text-center header-title">CINE SOPHIA TICKETS</div>

   <h5 class="section-title">STUDENT DETAILS</h5>
   <label>Full Name</label>
   <input type="text" id="fullname" class="form-control" value="Juan Dela Cruz">

   <div class="payment-box mt-4">
    <h5 class="section-title">Payment Details</h5>
    <Label>Quantity (₱250.00 each)</Label>
    <input type="number" id="quantity" class="form-control" value="3">

    <div class="payment-box mt-4">
        <h5 class="section-title">Payment of Details</h5>
        <p>Subtotal: <span id="subtotal">₱750.00</span></p>
                <p>Admin Fee: ₱50.00</p>
                <h4 class="total">Total: <span id="total">₱800.00</span></h4>
            </div>

   <div class="buttons mt-4">
    <button class="btn btn-main" onclick="calculatetotal()">Complete Registration</button>
    <button class="btn btn-reset" onclick="resetForm()">Reset Form</button></button>
   </div>

   </div>
    </div>

    <script src="main.js"></script>

</body>
